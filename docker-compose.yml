version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: frazier
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: frazier_vcrm
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frazier -d frazier_vcrm"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://frazier:${POSTGRES_PASSWORD:-changeme}@db:5432/frazier_vcrm
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
      ICLOUD_USERNAME: ${ICLOUD_USERNAME:-}
      ICLOUD_APP_PASSWORD: ${ICLOUD_APP_PASSWORD:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      PROXYCURL_API_KEY: ${PROXYCURL_API_KEY:-}
      BING_NEWS_API_KEY: ${BING_NEWS_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      DIGEST_TO_EMAIL: ${DIGEST_TO_EMAIL:-}
      VIP_AUTO_APPROVE_THRESHOLD: ${VIP_AUTO_APPROVE_THRESHOLD:-0.85}
      COOLDOWN_DAYS: ${COOLDOWN_DAYS:-14}
      NODE_ENV: production

  # Runs the pipeline daily at 7 AM
  pipeline:
    build: .
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["node", "--import", "tsx", "src/pipeline/main.ts"]
    environment:
      DATABASE_URL: postgresql://frazier:${POSTGRES_PASSWORD:-changeme}@db:5432/frazier_vcrm
      ICLOUD_USERNAME: ${ICLOUD_USERNAME:-}
      ICLOUD_APP_PASSWORD: ${ICLOUD_APP_PASSWORD:-}
      GOOGLE_ACCESS_TOKEN: ${GOOGLE_ACCESS_TOKEN:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      PROXYCURL_API_KEY: ${PROXYCURL_API_KEY:-}
      BING_NEWS_API_KEY: ${BING_NEWS_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      DIGEST_TO_EMAIL: ${DIGEST_TO_EMAIL:-}
      VIP_AUTO_APPROVE_THRESHOLD: ${VIP_AUTO_APPROVE_THRESHOLD:-0.85}
      COOLDOWN_DAYS: ${COOLDOWN_DAYS:-14}
    profiles:
      - pipeline

  # Database migrations — run once
  migrate:
    build: .
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["npx", "drizzle-kit", "migrate"]
    environment:
      DATABASE_URL: postgresql://frazier:${POSTGRES_PASSWORD:-changeme}@db:5432/frazier_vcrm
    profiles:
      - setup

volumes:
  pgdata:
